services:
  sonarqube:
    image: sonarqube:26.4.0.121862-community
    ports:
      - "${SONARQUBE_PORT:-9000}:9000"
    volumes:
      - ${SONAR_PLUGIN_JAR:?Set SONAR_PLUGIN_JAR to the built plugin JAR}:/opt/sonarqube/extensions/plugins/sonar-alloweddependencies-plugin.jar:ro
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_logs:/opt/sonarqube/logs
      - sonarqube_temp:/opt/sonarqube/temp

volumes:
  sonarqube_data:
  sonarqube_logs:
  sonarqube_temp:
